name: flo101

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: flo101-api:dev
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - api-data:/data
      - api-corpora:/corpora
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: flo101-web:dev
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 5

volumes:
  api-data:
  api-corpora:
