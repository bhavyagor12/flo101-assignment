name: flo101

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: flo101-api:aws
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - api-data:/data
      - api-corpora:/corpora
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: flo101-web:aws
    ports:
      - "${WEB_PORT:-80}:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 10

volumes:
  api-data:
  api-corpora:
